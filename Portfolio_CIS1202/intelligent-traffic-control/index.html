<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Traffic Light Controller</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <h1>Traffic Control</h1>
      <p class="subtitle">Simple Intersection Simulator</p>
      <section class="mode-panel" aria-label="Mode Controls">
        <div class="mode-slider-wrap">
          <span class="mode-label">Manual</span>
          <label class="mode-switch" for="modeToggle">
            <input id="modeToggle" type="checkbox" />
            <span class="mode-switch__slider"></span>
          </label>
          <span class="mode-label">Timer</span>
        </div>

        <div class="config-grid">
          <label class="config-field" for="pedWalkInput">
            <span>Ped Walk (sec)</span>
            <input id="pedWalkInput" type="number" min="1" value="15" />
          </label>
          <label class="config-field" for="queueClearanceInput">
            <span>Queue / Clearance (sec)</span>
            <input id="queueClearanceInput" type="number" min="1" value="2" />
          </label>
        </div>

        <div id="timerPanel" class="timer-panel hidden">
          <div class="config-grid">
            <label class="config-field" for="nsGoInput">
              <span>N-S Go Time (sec)</span>
              <input id="nsGoInput" type="number" min="1" value="12" />
            </label>
            <label class="config-field" for="ewGoInput">
              <span>E-W Go Time (sec)</span>
              <input id="ewGoInput" type="number" min="1" value="12" />
            </label>
          </div>
          <div class="timer-actions">
            <button id="timerStartButton" type="button">Start</button>
            <button id="timerStopButton" type="button">Stop</button>
          </div>
        </div>
      </section>
      <button id="switchButton">Switch Lights</button>
      <button id="pedestrianButton">Request Pedestrian Crossing</button>
      <div class="status">
        Current Green: <span id="currentGreenLabel">North-South</span>
      </div>
    </aside>

    <main class="main-area">
      <div class="simulation-stage">
        <div class="intersection">
          <div class="traffic-group">
            <h2>North - South</h2>
            <div id="ns-counter" class="countdown" aria-live="polite">0s</div>
            <div class="traffic-light">
              <div id="ns-red" class="light red"></div>
              <div id="ns-yellow" class="light yellow"></div>
              <div id="ns-green" class="light green active"></div>
            </div>
          </div>

          <div class="traffic-group">
            <h2>East - West</h2>
            <div id="ew-counter" class="countdown" aria-live="polite">0s</div>
            <div class="traffic-light">
              <div id="ew-red" class="light red active"></div>
              <div id="ew-yellow" class="light yellow"></div>
              <div id="ew-green" class="light green"></div>
            </div>
          </div>
        </div>

        <div id="pedestrianDisplay" class="pedestrian-display dont-walk" aria-live="polite">
          <span id="pedestrianSignalText">DON'T WALK</span>
          <span id="pedestrianCountdown">0s</span>
        </div>
      </div>
    </main>

    <aside class="event-log" aria-label="Event Log">
      <div class="event-log__header">
        <h2>Event Log</h2>
        <button id="clearLogButton" type="button" class="event-log__clear">
          Clear
        </button>
      </div>
      <ol id="eventLogList" class="event-log__list" aria-live="polite"></ol>
    </aside>
  </div>

  <script src="script.js"></script>
</body>
</html>
